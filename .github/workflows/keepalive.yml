name: Neon Keep-alive

on:
  schedule:
    # 5分ごとにNeonへpingしてコールドスタートを防止
    # publicリポジトリではGitHub Actions無制限（$0）
    - cron: '*/5 * * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Neon via health endpoint
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/health" || echo "000")
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: Health check returned $STATUS (may not be deployed yet)"
          fi
